# ============================================================
# PhaseGuard - Layer 2 Docker Compose
#
# Services:
#   db         - PostgreSQL 16 with the pgvector extension
#   api        - FastAPI backend (Layer 2 speaker verification)
#   streamlit  - Streamlit frontend (enrollment / verification / dashboard)
#
# Usage:
#   1. cp .env.example .env   (edit values as needed)
#   2. docker-compose up --build
#   3. Run migrations:  docker-compose exec api alembic upgrade head
# ============================================================

version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: phaseguard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phaseguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phaseguard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-phaseguard_db}
    ports:
      - "5432:5432"
    volumes:
      - phaseguard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phaseguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phaseguard_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-phaseguard}:${POSTGRES_PASSWORD:-phaseguard_secret}@db:5432/${POSTGRES_DB:-phaseguard_db}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-phaseguard}:${POSTGRES_PASSWORD:-phaseguard_secret}@db:5432/${POSTGRES_DB:-phaseguard_db}
    ports:
      - "8000:8000"
    volumes:
      - phaseguard_models:/app/pretrained_models
      - phaseguard_uploads:/app/data/temp_uploads
      - phaseguard_logs:/app/logs
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: phaseguard_streamlit
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"

volumes:
  phaseguard_pgdata:
  phaseguard_models:
  phaseguard_uploads:
  phaseguard_logs:
